<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>성우 재무 대시보드</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    display: flex; justify-content: center; align-items: center;
    height: 100vh; background: linear-gradient(135deg, #e0e7ff 0%, #f0f4ff 100%);
  }
  .card {
    background: white; border-radius: 16px;
    padding: 48px 40px; width: 340px;
    box-shadow: 0 8px 32px rgba(67,56,202,0.12);
    text-align: center;
  }
  .icon { font-size: 40px; margin-bottom: 16px; }
  h2 { color: #4338ca; font-size: 20px; margin-bottom: 8px; }
  p { color: #6b7280; font-size: 14px; margin-bottom: 28px; }
  input[type="password"] {
    width: 100%; padding: 12px 16px; border: 2px solid #e5e7eb;
    border-radius: 8px; font-size: 18px; letter-spacing: 4px;
    text-align: center; outline: none; transition: border-color .2s;
  }
  input[type="password"]:focus { border-color: #4338ca; }
  button {
    margin-top: 16px; width: 100%; padding: 12px;
    background: #4338ca; color: white; border: none;
    border-radius: 8px; font-size: 16px; cursor: pointer;
    transition: background .2s;
  }
  button:hover { background: #3730a3; }
  .error {
    margin-top: 14px; color: #dc2626; font-size: 13px; display: none;
  }
</style>
</head>
<body>
<div class="card">
  <div class="icon">🔒</div>
  <h2>성우 재무 대시보드</h2>
  <p>비밀번호를 입력해주세요</p>
  <form id="frm">
    <input type="password" id="pwd" placeholder="••••" autofocus autocomplete="current-password">
    <button type="submit">확인</button>
    <div class="error" id="err">비밀번호가 틀렸습니다.</div>
  </form>
</div>
<script>
  if (document.cookie.split(';').some(c => c.trim() === 'fin_auth=0306')) {
    location.replace('/')
  }
  document.getElementById('frm').addEventListener('submit', function(e) {
    e.preventDefault()
    if (document.getElementById('pwd').value === '0306') {
      document.cookie = 'fin_auth=0306; path=/; max-age=86400; SameSite=Lax'
      location.replace('/')
    } else {
      document.getElementById('err').style.display = 'block'
      document.getElementById('pwd').value = ''
      document.getElementById('pwd').focus()
    }
  })
</script>
</body>
</html>
